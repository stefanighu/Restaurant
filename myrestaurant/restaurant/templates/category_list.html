{% extends 'base.html' %}

{% block title %}Категории{% endblock %}

{% block content %}
<h1>Категории</h1>

<ul>
    {% for category in categories %}
        <li>

            {% if category.media.first %}
                <img src="{{ category.media.first.file.url }}" width="150">
            {% endif %}

            <a href="{% url 'dishes' category.id %}">
                {{ category.name }}
            </a>
        </li>
    {% endfor %}
</ul>

{% endblock %}
